name: Release Image

on:
  pull_request:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

env:
  IMAGE_NAME: ghcr.io/monsterray/mochad-docker
  MOCHAD_REPOSITORY: https://github.com/Monsterray/mochad-redux.git
  MOCHAD_REF: develop

jobs:
  image:
    name: Build release image
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare release metadata
        id: release-meta
        run: |
          set -eu
          created="$(git show -s --format=%cI "$GITHUB_SHA")"
          packaging_sha="$GITHUB_SHA"
          if [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="0.0.0-pr"
          fi
          alpine_digest="$(docker buildx imagetools inspect docker.io/library/alpine:3.22 --format '{{ .Digest }}')"
          redux_dir="$(mktemp -d)"
          git clone --depth 1 --branch "$MOCHAD_REF" "$MOCHAD_REPOSITORY" "$redux_dir"
          redux_sha="$(git -C "$redux_dir" rev-parse HEAD)"
          if [ -f "$redux_dir/VERSION" ]; then
            redux_version="$(cat "$redux_dir/VERSION")"
          else
            redux_version="$(git -C "$redux_dir" describe --tags --always)"
          fi
          {
            echo "created=$created"
            echo "version=$version"
            echo "packaging_sha=$packaging_sha"
            echo "alpine_digest=$alpine_digest"
            echo "redux_sha=$redux_sha"
            echo "redux_version=$redux_version"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          pull: true
          push: ${{ startsWith(github.ref, 'refs/tags/v') }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.release-meta.outputs.version }}
          labels: |
            org.opencontainers.image.title=mochad-docker
            org.opencontainers.image.description=X10 CM15A CM19A USB automation daemon
            org.opencontainers.image.source=https://github.com/Monsterray/mochad-docker
            org.opencontainers.image.version=${{ steps.release-meta.outputs.version }}
            org.opencontainers.image.revision=${{ steps.release-meta.outputs.packaging_sha }}
            org.opencontainers.image.created=${{ steps.release-meta.outputs.created }}
            org.opencontainers.image.licenses=MIT AND GPL-3.0-or-later
            org.opencontainers.image.base.name=docker.io/library/alpine:3.22
            org.opencontainers.image.base.digest=${{ steps.release-meta.outputs.alpine_digest }}
            io.github.monsterray.mochad-redux.repository=${{ env.MOCHAD_REPOSITORY }}
            io.github.monsterray.mochad-redux.revision=${{ steps.release-meta.outputs.redux_sha }}
            io.github.monsterray.mochad-redux.version=${{ steps.release-meta.outputs.redux_version }}
          build-args: |
            BUILD_DATE=${{ steps.release-meta.outputs.created }}
            VCS_REF=${{ steps.release-meta.outputs.packaging_sha }}
            IMAGE_VERSION=${{ steps.release-meta.outputs.version }}
            MOCHAD_REPOSITORY=${{ env.MOCHAD_REPOSITORY }}
            MOCHAD_REF=${{ env.MOCHAD_REF }}
          sbom: true
          provenance: mode=max

      - name: Release evidence reminder
        run: |
          cat <<EOF
          Record these values in release evidence before publishing release notes:
          packaging_sha=${{ steps.release-meta.outputs.packaging_sha }}
          redux_sha=${{ steps.release-meta.outputs.redux_sha }}
          redux_version=${{ steps.release-meta.outputs.redux_version }}
          alpine_digest=${{ steps.release-meta.outputs.alpine_digest }}
          image=${{ env.IMAGE_NAME }}:${{ steps.release-meta.outputs.version }}
          platform_digests=record from GHCR package page or docker buildx imagetools inspect
          manifest_digest=record from docker buildx imagetools inspect
          sbom=attached by BuildKit on tag builds
          provenance=attached by BuildKit on tag builds
          license_paths=/usr/share/licenses/mochad-docker and /usr/share/licenses/mochad-redux
          EOF
