---
services:
  mochad:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MOCHAD_REPOSITORY: ${MOCHAD_REPOSITORY:-https://github.com/Monsterray/mochad-redux.git}
        MOCHAD_REF: ${MOCHAD_REF:-develop}
        MOCHAD_SOURCE_SHA: ${MOCHAD_SOURCE_SHA:-unknown}
        BUILD_DATE: ${BUILD_DATE:-1970-01-01T00:00:00Z}
        VCS_REF: ${VCS_REF:-unknown}
        IMAGE_VERSION: ${IMAGE_VERSION:?set IMAGE_VERSION or use --env-file release/versions.env}
        ALPINE_BASE_IMAGE: ${ALPINE_BASE_IMAGE:-alpine:3.22}
        ALPINE_DIGEST: ${ALPINE_DIGEST:-unknown}
        MOCHAD_REDUX_REVISION: ${MOCHAD_REDUX_REVISION:-${MOCHAD_SOURCE_SHA:-unknown}}
        MOCHAD_REDUX_VERSION: ${MOCHAD_REDUX_VERSION:-unknown}
        REQUIRE_AUDITED_SOURCE: ${REQUIRE_AUDITED_SOURCE:-false}
    image: x10-mochad:local
    container_name: mochad
    hostname: mochad
    restart: unless-stopped

    volumes:
      - /dev/bus/usb:/dev/bus/usb
      - mochad-config:/config

    device_cgroup_rules:
      - "c 189:* rwm"

    ports:
      - "${MOCHAD_PORT:-1099}:${MOCHAD_PORT:-1099}" # Main tcp port
      # - "${MOCHAD_XML_PORT:-1100}:${MOCHAD_XML_PORT:-1100}" # optional XML socket
      # - "${MOCHAD_OPENREMOTE_PORT:-1101}:${MOCHAD_OPENREMOTE_PORT:-1101}" # optional OpenRemote socket

    environment:
      PUID: ${PUID:-911}
      PGID: ${PGID:-911}
      USB_GID: ${USB_GID:-auto}
      USB_DEBUG: ${USB_DEBUG:-false}
      TZ: ${TZ:-America/Los_Angeles}
      UMASK: ${UMASK:-022}
      MOCHAD_FOREGROUND: ${MOCHAD_FOREGROUND:-true}
      MOCHAD_RAW_DATA: ${MOCHAD_RAW_DATA:-false}
      MOCHAD_BIND: ${MOCHAD_BIND:-0.0.0.0}
      MOCHAD_PORT: ${MOCHAD_PORT:-1099}
      MOCHAD_XML_ENABLED: ${MOCHAD_XML_ENABLED:-true}
      MOCHAD_XML_PORT: ${MOCHAD_XML_PORT:-1100}
      MOCHAD_OPENREMOTE_ENABLED: ${MOCHAD_OPENREMOTE_ENABLED:-true}
      MOCHAD_OPENREMOTE_PORT: ${MOCHAD_OPENREMOTE_PORT:-1101}
      MOCHAD_SHOW_VERSION: ${MOCHAD_SHOW_VERSION:-false}
      MOCHAD_SHOW_HELP: ${MOCHAD_SHOW_HELP:-false}
      MOCHAD_ARGS: ${MOCHAD_ARGS:-}

    healthcheck:
      test: ["CMD-SHELL", "bind=\"$${MOCHAD_BIND:-0.0.0.0}\"; case \"$$bind\" in 0.0.0.0) health_host=127.0.0.1 ;; ::) health_host=::1 ;; *) health_host=\"$$bind\" ;; esac; nc -z \"$$health_host\" \"$${MOCHAD_PORT:-1099}\" || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  mochad-config:
