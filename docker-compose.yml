---
services:
  mochad:
    build:
      context: .
      dockerfile: Dockerfile
    image: x10-mochad:local
    container_name: mochad
    hostname: mochad
    restart: unless-stopped

    devices:
      - /dev/bus/usb:/dev/bus/usb

    privileged: true
    cap_add:
      - SYS_ADMIN
      - SYS_RAWIO

    ports:
      # Host port only. Upstream mochad hardcodes internal port 1099.
      - "${MOCHAD_PORT:-1099}:1099" # Main tcp port
      #   - "1100:1100" # optional XML socket
      #   - "1101:1101" # optional OpenRemote socket

    environment:
      TZ: ${TZ:-America/Los_Angeles}
      MOCHAD_FOREGROUND: ${MOCHAD_FOREGROUND:-true}
      MOCHAD_RAW_DATA: ${MOCHAD_RAW_DATA:-false}
      MOCHAD_SHOW_VERSION: ${MOCHAD_SHOW_VERSION:-false}
      MOCHAD_SHOW_HELP: ${MOCHAD_SHOW_HELP:-false}
      MOCHAD_ARGS: ${MOCHAD_ARGS:-}

    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 1099 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
